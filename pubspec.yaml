name: fitness_tracker
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.3.0
  go_router: ^17.2.3
  dio: ^5.9.2
  flutter_secure_storage: ^10.2.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  jwt_decoder: ^2.0.1
  logger: ^2.7.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/biceps_splash.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/biceps_splash.png"
  windows:
    generate: true
    image_path: "assets/biceps_splash.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/biceps_splash.png"

flutter_native_splash:
  image: assets/biceps_splash.png
  color: "#ffffff"
  android_12:
    image: assets/biceps_splash_12.png

flutter:
  uses-material-design: true
  assets:
    - assets/list.svg
    - assets/back.png
    - assets/abs.png
    - assets/arms.png
    - assets/legs.png
    - assets/chest.png
    - assets/shoulders.png
    - assets/avatar.svg
    - assets/biceps_splash.png
